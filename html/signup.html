<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký - My School</title>
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="stylesheet" href="../css/homepage.css" />
  </head>

  <body>


    <div class="auth-container">
      <h1>Đăng ký</h1>

      <form id="signup-form" class="auth-form">
        <label>Họ tên</label>
        <input id="signup-name" type="text" placeholder="Nhập họ tên" required />

        <label>Email</label>
        <input id="signup-email" type="email" placeholder="Nhập email" required />

        <label>Mật khẩu</label>
        <input id="signup-password" type="password" placeholder="Nhập mật khẩu" required />

        <button type="submit">Tạo tài khoản</button>
      </form>

      <p class="auth-link">
        Đã có tài khoản? <a href="./login.html">Đăng nhập</a>
      </p>
    </div>

    <script src="../js/cart.js"></script>
    <script src="../js/auth.js"></script>
    <script>
      renderUserUI();
    </script>
  </body>
</html>
