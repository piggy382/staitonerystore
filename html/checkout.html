<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - My School</title>
    <link rel="icon" href="../img/favicon.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>

<body>
    <div id="header-container"></div>

    <main class="checkout-container">
        <div class="checkout-layout">
            <!-- Delivery Info Form -->
            <section class="checkout-form-section">
                <h2 class="form-title">Thông tin giao hàng</h2>
                <div class="form-group" id="address-selector-group" style="display:none; margin-bottom: 20px;">
                    <label style="font-weight: 600; margin-bottom: 8px; display: block;">Chọn từ sổ địa chỉ</label>
                    <select id="checkout-address-select"
                        style="width:100%; padding:10px; border:1px solid var(--card-border); border-radius:5px; background:var(--card-bg); color:var(--text-color); font-family:inherit;">
                        <option value="">-- Nhập địa chỉ thay thế --</option>
                    </select>
                </div>
                <form id="checkout-form" class="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ và tên</label>
                            <input type="text" id="checkout-name" placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input type="tel" id="checkout-phone" placeholder="0987654321" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Địa chỉ Email</label>
                        <input type="email" id="checkout-email" placeholder="email@tlu.edu.vn" required>
                    </div>

                    <div class="form-group">
                        <label>Địa chỉ nhận hàng</label>
                        <input type="text" id="checkout-address" placeholder="Tòa A, Ngõ 10, Hà Nội" required>
                    </div>

                    <div class="form-group">
                        <label>Ghi chú đơn hàng (Tùy chọn)</label>
                        <textarea id="checkout-note" rows="3" placeholder="Giao hàng buổi sáng..."></textarea>
                    </div>

                    <h2 class="form-title" style="margin-top: 30px;">Phương thức thanh toán</h2>
                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="cod" checked>
                            <span class="payment-card">
                                <i class="fas fa-truck"></i>
                                Thanh toán khi nhận hàng (COD)
                            </span>
                        </label>
                        <label class="payment-option" style="opacity: 0.5; cursor: not-allowed;">
                            <input type="radio" name="paymentMethod" value="bank" disabled>
                            <span class="payment-card" style="border-color: #ddd;">
                                <i class="fas fa-university"></i>
                                Chuyển khoản ngân hàng <span
                                    style="font-size: 0.8rem; color: #888; font-weight: normal; margin-left: auto;">(Sắp
                                    ra mắt)</span>
                            </span>
                        </label>
                        <label class="payment-option" style="opacity: 0.5; cursor: not-allowed;">
                            <input type="radio" name="paymentMethod" value="wallet" disabled>
                            <span class="payment-card" style="border-color: #ddd;">
                                <i class="fas fa-wallet"></i>
                                Ví điện tử (Momo/ZaloPay) <span
                                    style="font-size: 0.8rem; color: #888; font-weight: normal; margin-left: auto;">(Sắp
                                    ra mắt)</span>
                            </span>
                        </label>
                    </div>
                </form>
            </section>

            <!-- Order Summary -->
            <aside class="checkout-summary">
                <div class="summary-card">
                    <h3>Đơn hàng của bạn</h3>

                    <div id="checkout-items" class="checkout-items-preview">
                        <!-- Filled by JS -->
                    </div>

                    <hr class="summary-divider">

                    <div class="summary-line">
                        <span>Tạm tính:</span>
                        <span id="checkout-subtotal">0đ</span>
                    </div>
                    <div class="summary-line">
                        <span>Phí vận chuyển:</span>
                        <span id="checkout-shipping">30.000đ</span>
                    </div>

                    <hr class="summary-divider">

                    <div class="summary-line total">
                        <span>Tổng thanh toán:</span>
                        <strong id="checkout-final-total">0đ</strong>
                    </div>

                    <button type="submit" form="checkout-form" class="btn-checkout-confirm">XÁC NHẬN ĐẶT HÀNG</button>
                    <a href="./cart.html" class="btn-return-cart">Quay lại giỏ hàng</a>
                </div>
            </aside>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>Đặt hàng thành công!</h2>
            <p>Cảm ơn bạn đã mua sắm tại My School. Đơn hàng của bạn đang được xử lý.</p>
            <a href="./homepage.html" class="btn-back-home">Về trang chủ</a>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../js/toast.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/checkout.js"></script>
</body>

</html>
