<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Đăng nhập - My School</title>
  <link rel="icon" href="../img/favicon.svg" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/homepage.css" />
  <script src="../js/theme.js"></script>
  <script>
    (function () {
      const theme = localStorage.getItem('app_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      document.write('<style>body { opacity: 0; transition: opacity 0.3s ease; }</style>');
    })();
  </script>
</head>

<body>
  <div id="header-container"></div>

  <div class="auth-container">
    <h1 data-i18n="login">Đăng nhập</h1>

    <form id="login-form" class="auth-form">
      <label data-i18n="email">Email</label>
      <input id="login-email" type="email" data-i18n-placeholder="email" placeholder="Nhập email" required />

      <label data-i18n="password">Mật khẩu</label>
      <input id="login-password" type="password" data-i18n-placeholder="password" placeholder="Nhập mật khẩu"
        required />

      <div class="remember-me"
        style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-color);">
        <input type="checkbox" id="login-remember"
          style="width: 16px; height: 16px; accent-color: var(--btn-primary); cursor: pointer;">
        <label for="login-remember" style="margin: 0; cursor: pointer;">Ghi nhớ mật khẩu</label>
      </div>

      <button type="submit" data-i18n="login">Đăng nhập</button>
    </form>

    <p class="auth-link">
      <span data-i18n="dont_have_account">Chưa có tài khoản?</span> <a href="./signup.html" data-i18n="signup">Đăng
        ký</a>
    </p>
  </div>

  <div id="footer-container"></div>

  <script src="../js/theme.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/auth.js"></script>

</body>

</html>
