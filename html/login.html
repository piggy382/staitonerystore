<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập - My School</title>
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/homepage.css" />
  </head>

  <body>
    <!-- Navbar giống style của bạn (giữ đơn giản) -->

    <div class="auth-container">
      <h1>Đăng nhập</h1>

      <form id="login-form" class="auth-form">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="Nhập email" required />

        <label>Mật khẩu</label>
        <input id="login-password" type="password" placeholder="Nhập mật khẩu" required />

        <button type="submit">Đăng nhập</button>
      </form>

      <p class="auth-link">
        Chưa có tài khoản? <a href="./signup.html">Đăng ký</a>
      </p>
    </div>
      <script src="../json/auth.js"></script>
    
  </body>
</html>
