<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - My School</title>
    <link rel="icon" href="../img/favicon.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/homepage.css" />
    <link rel="stylesheet" href="../css/product-detail.css" />
    <script src="../js/theme.js"></script>
    <script>
        (function () {
            const theme = localStorage.getItem('app_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            document.write('<style>body { opacity: 0; transition: opacity 0.3s ease; }</style>');
        })();
    </script>
</head>

<body>
    <div id="header-container"></div>

    <main class="product-detail-container">
        <div id="product-detail-content">
            <!-- Content injected by product-detail.js -->
            <p style="text-align:center; padding: 50px;" data-i18n="loading">Đang tải...</p>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="../js/i18n.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/product-detail.js"></script>
</body>

</html>
