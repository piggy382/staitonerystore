<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - My School</title>
    <link rel="icon" href="../img/favicon.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/cart.css">
    <script src="../js/theme.js"></script>
    <script>
        (function () {
            const theme = localStorage.getItem('app_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            document.write('<style>body { opacity: 0; transition: opacity 0.3s ease; }</style>');
        })();
    </script>
</head>

<body>
    <div id="header-container"></div>

    <main class="cart-container">
        <h1 class="page-title" data-i18n="cart_title">Giỏ hàng của bạn</h1>

        <div class="cart-layout">
            <section class="cart-items-section">
                <div id="cart-items-list">
                </div>
                <div class="cart-footer">
                    <button id="clear-all-cart" class="btn-danger-outline" data-i18n="cart_clear">Xóa toàn bộ giỏ
                        hàng</button>
                </div>
            </section>

            <aside class="cart-summary">
                <div class="summary-card">
                    <h3 data-i18n="cart_summary">Tóm tắt đơn hàng</h3>
                    <div class="summary-line">
                        <span data-i18n="cart_subtotal">Tạm tính:</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="summary-line">
                        <span data-i18n="cart_shipping">Phí vận chuyển:</span>
                        <span id="shipping-fee">0đ</span>
                    </div>
                    <hr style="border: none; border-top: 1px solid var(--card-border); margin: 20px 0;">

                    <div class="promo-container">
                        <input type="text" class="promo-input" placeholder="Mã giảm giá">
                        <button class="btn-promo">Áp dụng</button>
                    </div>

                    <div class="summary-line total" style="margin-top: 20px;">
                        <span data-i18n="cart_total">Tổng cộng:</span>
                        <strong id="final-total">0đ</strong>
                    </div>
                    <a href="./checkout.html" class="btn-checkout"
                        style="display: block; text-align: center; text-decoration: none; display: flex; justify-content: center; align-items: center;"
                        data-i18n="cart_checkout">TIẾN HÀNH THANH TOÁN</a>
                </div>
            </aside>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="../js/theme.js"></script>
    <script src="../js/i18n.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/cart.js"></script>
</body>

</html>
