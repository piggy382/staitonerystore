<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - My School</title>
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="./homepage.html">MY SCHOOL</a></div>
        <div class="cart-icon">
            <a href="./cart.html">🛒 <span id="cart-count">0</span></a>
        </div>
    </nav>

    <main class="cart-container">
        <h1 class="page-title">Giỏ hàng của bạn</h1>

        <div class="cart-layout">
            <section class="cart-items-section">
                <div id="cart-items-list">
                    </div>
                <div class="cart-footer">
                    <a href="./productlist.html" class="btn-secondary">← Tiếp tục mua sắm</a>
                    <button id="clear-all-cart" class="btn-danger-outline">Xóa toàn bộ giỏ hàng</button>
                </div>
            </section>

            <aside class="cart-summary">
                <div class="summary-card">
                    <h3>Tóm tắt đơn hàng</h3>
                    <div class="summary-line">
                        <span>Tạm tính:</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="summary-line">
                        <span>Phí vận chuyển:</span>
                        <span id="shipping-fee">0đ</span>
                    </div>
                    <hr>
                    <div class="summary-line total">
                        <span>Tổng cộng:</span>
                        <strong id="final-total">0đ</strong>
                    </div>
                    <button class="btn-checkout">TIẾN HÀNH THANH TOÁN</button>
                </div>
            </aside>
        </div>
    </main>

    <script src="../json/cart.js"></script>
</body>
</html>
