<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - My School</title>
  <link rel="icon" href="../img/favicon.ico" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/homepage.css" />
</head>

<body>
  <div id="header-container"></div>

  <div class="banner">
    <div class="banner-content">
      <h2 data-i18n="banner_title">Ưu đãi năm học mới</h2>
      <p data-i18n="banner_desc">Giảm giá bút – vở – dụng cụ học tập lên đến 30%</p>
      <button data-i18n="banner_btn">Xem ngay</button>
    </div>
  </div>

  <div class="category">
    <h2 data-i18n="categories">Danh mục sản phẩm</h2>
    <div class="category-list">
      <div class="category-item"><a href="./productlist.html" data-i18n="category_list">Danh sách sản phẩm</a></div>
      <div class="category-item" data-i18n="category_notebooks">Vở học sinh</div>
      <div class="category-item" data-i18n="category_tools">Dụng cụ học tập</div>
      <div class="category-item" data-i18n="category_office">Văn phòng phẩm</div>
    </div>
  </div>

  <div class="bestseller">
    <h2 data-i18n="bestsellers">Sản phẩm nổi bật</h2>
    <div class="product-list" id="product-list">
      <!-- Products will be generated here by script.js -->
    </div>
  </div>

  <div id="footer-container"></div>

  <!-- Scripts must load after containers exist -->
  <script src="../js/theme.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/cart.js"></script>
</body>

</html>
